<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Stylized G arc -->
  <path d="M42 16 A18 18 0 1 0 42 48" fill="none" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Horizontal bar of G -->
  <line x1="32" y1="32" x2="44" y2="32" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round"/>
  <!-- Connection nodes -->
  <circle cx="42" cy="16" r="4.5" fill="#38bdf8"/>
  <circle cx="42" cy="48" r="4.5" fill="#f472b6"/>
  <circle cx="44" cy="32" r="4.5" fill="#a78bfa"/>
  <!-- Connection lines from center reaching out -->
  <line x1="44" y1="32" x2="54" y2="22" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="56" y2="36" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="52" y2="44" stroke="#f472b6" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Outer connection dots -->
  <circle cx="54" cy="22" r="3" fill="#38bdf8" opacity="0.7"/>
  <circle cx="56" cy="36" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle cx="52" cy="44" r="3" fill="#f472b6" opacity="0.7"/>
</svg>
