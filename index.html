<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="GConnect — A professional contacts directory to connect with professionals across industries." />
  <title>GConnect Directory</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- Live animated background -->
  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <header>
    <div class="header-top">
      <!-- GConnect logo -->
      <svg class="header-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="64"
        height="64">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="50%" stop-color="#a78bfa" />
            <stop offset="100%" stop-color="#f472b6" />
          </linearGradient>
          <linearGradient id="logoGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#a78bfa" />
          </linearGradient>
        </defs>
        <path d="M42 16 A18 18 0 1 0 42 48" fill="none" stroke="url(#logoGrad)" stroke-width="4.5"
          stroke-linecap="round" />
        <line x1="32" y1="32" x2="44" y2="32" stroke="url(#logoGrad2)" stroke-width="4" stroke-linecap="round" />
        <circle cx="42" cy="16" r="4.5" fill="#38bdf8" />
        <circle cx="42" cy="48" r="4.5" fill="#f472b6" />
        <circle cx="44" cy="32" r="4.5" fill="#a78bfa" />
        <line x1="44" y1="32" x2="54" y2="22" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"
          stroke-linecap="round" />
        <line x1="44" y1="32" x2="56" y2="36" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"
          stroke-linecap="round" />
        <line x1="44" y1="32" x2="52" y2="44" stroke="#f472b6" stroke-width="1.5" opacity="0.5"
          stroke-linecap="round" />
        <circle cx="54" cy="22" r="3" fill="#38bdf8" opacity="0.7" />
        <circle cx="56" cy="36" r="3" fill="#a78bfa" opacity="0.7" />
        <circle cx="52" cy="44" r="3" fill="#f472b6" opacity="0.7" />
      </svg>
      <div>
        <h1 class="gradient-title">GConnect Network</h1>
      </div>
      <span id="contactBadge" class="contact-badge" style="display:none;">
        <span id="badgeCount">0</span>&nbsp;Professionals
      </span>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat-item">
      <span class="stat-value" id="statContacts">0</span>
      <span class="stat-label">Contacts</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="statCompanies">0</span>
      <span class="stat-label">Companies</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="statLocations">0</span>
      <span class="stat-label">Locations</span>
    </div>
  </div>

  <main>
    <div class="toolbar" id="toolbar">
      <div class="search">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="18"
          height="18">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2" />
          <line x1="13.5" y1="13.5" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input id="searchInput" type="text" placeholder="Search by name, company, role, or location…" />
        <button id="clearBtn" class="clear-btn" style="display:none;" aria-label="Clear search">&times;</button>
      </div>
    </div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">No matching results</div>
  </main>

  <footer>
    <div class="footer-content">
      <span>Built with</span>
      <a href="https://supabase.com" target="_blank" rel="noopener">
        <svg class="footer-icon" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
          <path
            d="M21.362 9.354H12V.396a.396.396 0 0 0-.716-.233L2.203 12.424h9.362v8.959a.396.396 0 0 0 .716.233l9.081-12.262z" />
        </svg>
        Supabase
      </a>
      <span>·</span>
      <span>Hosted on</span>
      <a href="https://pages.github.com" target="_blank" rel="noopener">
        <svg class="footer-icon" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
          <path
            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
        </svg>
        GitHub Pages
      </a>
    </div>
  </footer>

  <!-- Back to top button -->
  <button id="backToTop" class="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
      <path d="M10 3l7 7h-4.5v7h-5v-7H3l7-7z" />
    </svg>
  </button>

  <script src="script.js"></script>
</body>

</html>
